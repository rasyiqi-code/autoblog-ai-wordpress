name: PHPUnit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php:
          - '8.2'
          - '8.3'
      fail-fast: false

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, json, gd, dom
          coverage: none

      - name: 🔍 Verify PHP version
        run: php -v

      - name: 📦 Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: 💾 Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: 📦 Install dependencies
        run: |
          composer install --prefer-dist --no-progress --no-interaction
          # Fix platform check if running PHP 8.2 on a project that requires 8.3
          if php -r 'exit(PHP_VERSION_ID < 80300 ? 0 : 1);'; then
            echo "Patching platform_check.php for PHP 8.2 compatibility..."
            sed -i 's/PHP_VERSION_ID >= 80300/PHP_VERSION_ID >= 80200/' vendor/composer/platform_check.php
          fi

      - name: 🧪 Run all unit tests
        run: php vendor/bin/phpunit --group unit --colors=always

      - name: 🧪 Run regression tests (PHP 8.3 only)
        if: matrix.php == '8.3'
        run: php vendor/bin/phpunit --group regression --colors=always
